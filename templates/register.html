{% extends 'base.html' %}
{% block title %}Create Account — VegNutri{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🌿</div>
    <h2>Create your account</h2>
    <p class="auth-sub">Start your personalised vegetarian nutrition journey</p>
    <form method="POST" class="auth-form" id="registerForm">
      <div class="form-group">
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" name="username" placeholder="e.g. rahul_fit" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" name="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" name="password" placeholder="Min 6 characters" minlength="6" required autocomplete="new-password"/>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="registerBtn">Create Account</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>
    <div class="auth-features">
      <span>✅ Free forever</span>
      <span>🔒 Your data stays private</span>
      <span>⚡ Setup in 2 min</span>
    </div>
  </div>
</div>
{% endblock %}
